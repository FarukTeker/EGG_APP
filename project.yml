name: VestelEggCooker
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "18.0"
configs:
  Debug: debug
  Release: release
targets:
  VestelEggCooker:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vestel.eggcooker
        PRODUCT_NAME: VestelEggCooker
        INFOPLIST_KEY_CFBundleDisplayName: "Vestel Egg"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets: []
